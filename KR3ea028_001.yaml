body:
  text: 卷上本輸肺出於少商手大指端內側也心出於中衝手中指之端也肝出於大敦足大指之端及三毛之中也脾出於隱白足大指之端內側也腎出於湧泉足心也膀胱出於至陰足小指之端也膽出於竅陰足小指次指之端也胃出於厲兌足大指內次指之端也三焦者上合手少陽出於關衝手小指次指之端也三焦下腧在於足大指之前少陽之後出於膕中外廉是太陽絡也手少陽經也小腸者上合於太陽出於少澤小指之端也大腸上合手陽明出於商陽大指次指之端也肺合大腸大腸者傳道之腑心合小腸小腸者受盛之腑肝合膽膽者中精之腑脾合胃胃者五穀之腑腎合膀胱膀胱者津液之腑也少陽屬腎腎上連肺故將兩藏三焦者中瀆之腑也水道出焉屬膀胱是孤之腑也邪氣臟腑病形愁憂恐懼則傷心形寒寒飲則傷肺以其兩寒相感中外皆傷故氣逆而上行有所墮墜惡血留內若有所大怒氣上而不下積於脅下則傷肝有所擊僕若醉入房汗出當風則傷脾有所用力舉重若入房過度汗出浴水則傷腎見其色知其病命曰明按其脈知其病命曰神問其病知其處命曰工夫色脈與尺之相應也如桴鼓影響之相應也不得相失也此亦本末根葉之出候也故根死則葉枯矣色脈形肉不得相失也故知一則為工知二則為神知三則神且明矣色青者其脈弦也赤者其脈鉤也黃者其脈代也白者其脈毛黑者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相生之脈則病已矣先定其五色五脈之應其病乃可別也心脈急甚者為瘛瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行時唾血大甚為喉吤微大為心痹引背善淚出小甚為善噦微小為消疸滑甚為善渴微滑為心疝引臍小腹鳴澀甚為喑微澀為血溢維厥耳鳴顛疾肺脈急甚為癲疾微急為肺寒熱怠惰咳唾血引腰背胸若鼻息肉不通緩甚為多汗微緩為痿瘻偏風頭以下汗出不可止大甚為脛腫微大為肺痹引胸背起惡日光小甚為泄微小為消疸滑甚為息賁上氣微滑為上下出血澀甚為嘔血微澀為鼠瘻在頸支腋之間下不勝其上其應善酸矣肝脈急甚者為惡言微急為肥氣在脅下若覆杯緩甚為善嘔微緩為水瘕痹也大甚為內癰善嘔衄微大為肝痹陰縮咳引小腹小甚為多飲微小為消疸滑甚為㿉疝微滑為遺溺澀甚為溢飲微澀為瘛攣筋痹脾脈急甚為瘛瘲微急為膈中食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無病大甚為擊朴微大為痞氣腹裡大膿血在腸胃之外小甚為寒熱微小為消疸滑甚為㿉癃微滑為蟲毒蛔蠍腹熱澀甚為腸㿉微澀為內㿉多下膿血腎脈急甚為骨癲疾微急為沉厥奔豚足不收不得前後緩甚為折脊微緩為洞洞者食不化下嗌還出大甚為陰痿微大為石水起臍已下至小腹腄腄然上至胃脘死不治小甚為洞泄微小為消疸滑甚為癃㿉微滑為骨痿坐不能起起則目無所見澀甚為大癰微澀為不月沉痔諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱澀者多血少氣微有寒面熱者足陽明病魚絡血者手陽明病兩跗之上脈豎陷者足陽明病此胃脈也大腸病者腸中切痛而鳴濯濯冬日重感於寒即泄當臍而痛不能久立與胃同候小腸病者小腹痛腰脊控睪音高而痛時窘之後當耳前熱若寒甚若獨肩上熱甚及手小指次指之間熱若脈陷者此其候也手太陽病也三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹候在足太陽之外大絡大絡在太陽少陽之間亦見於脈膀胱病者小腹偏腫而痛以手按之即欲小便而不得肩上熱若脈陷及足小趾外廉及脛踝後皆熱膽病者善太息口苦嘔宿汁心下淡淡恐人將捕之嗌中吤吤然數唾在足少陽之本末根結一日一夜五十營以營五臟之精不應數者名曰狂生所謂五十營者五藏皆受氣持其脈口數其至也五十動而不一代者五藏皆受氣四十動一代者一藏無氣三十動一代者二藏無氣二十動一代者三藏無氣十動一代者四藏無氣不滿十動一代者五藏無氣所謂五十動而不一代者以為常也形氣不足病氣有餘是邪勝也急瀉之形氣有餘病氣不足急補之形氣不足病氣不足此陰陽氣俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五藏空虛筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘此謂陰陽俱有餘也急瀉其邪調其虛實故曰有餘者瀉之不足者補之壽夭剛柔在內者五藏為陰六腑為陽在外者筋骨為陰皮膚為陽病在陽者命曰風病在陰者命曰痹陰陽俱病命曰風痹病有形而不痛者陽之類也無形而痛者陰之類也無形而痛者其陽完而陰傷之也急治其陰無攻其陽有形而不痛者其陰完而陽傷之也急治其陽無攻其陰陰陽俱動乍有形乍無形加以煩心命曰陰勝其陽此謂不表不里其形不久風寒傷形憂恐忿怒傷氣氣傷臟乃病臟寒傷形乃應形風傷筋脈筋脈乃應此形氣外內之相應也形與氣相任則壽不相任則夭皮與肉相果則壽不相果則夭血氣經絡勝形則壽不勝形則夭形充而皮膚緩者則壽形充而皮膚急者則夭形充而脈堅大者順也形充而脈小以弱者氣衰衰則危矣若形充而顴不起者骨小骨小而夭矣形充而大肉㿉堅而有分者肉堅肉堅則壽矣形充而大肉無分理不堅者肉脆肉脆則夭矣此天之生命所以立形定氣而視壽夭者必明乎此立形定氣而後以臨病人決死生平人而氣勝形者壽病而形肉脫氣勝形者死形勝氣者危矣本神天之在我者氣也德流氣薄而生者也故生之來謂之精兩精相搏謂之神隨神往來者謂之魂並精而出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智故智者之養生也必順四時而適寒暑和喜怒而安居處節陰陽而調剛柔如是則僻邪不至長生久視是故怵惕思慮者則傷神神傷則恐懼流淫而不止因悲哀動中者竭絶而失生喜樂者神憚散而不藏愁憂者氣閉塞而不行盛怒者迷惑而不治恐懼者神蕩憚而不收心怵惕思慮則傷神神傷則恐懼自失破㿉脫肉毛悴色夭死於冬脾愁憂而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春肝悲哀動中則傷魂魂傷則忘不精不精則不正當人陰縮而攣筋兩脅骨不舉毛悴色夭死於秋肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俯仰屈伸毛悴色夭死於季夏恐懼而不解則傷精精傷則骨酸痿厥精時自下是故五藏主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣肝藏血血舍魂肝氣虛則恐實則怒脾藏營營舍意脾氣虛則四肢不用五藏不安實則腹脹經溲不利心藏脈脈舍神心氣虛則悲實則笑不休肺藏氣氣舍魄肺氣虛則鼻塞不利少氣實則喘喝胸盈仰息腎藏精精舍志腎氣虛則厥實則脹五藏不安必審五藏之病形以知其氣之虛實謹而調之也終結平人不病者脈口人迎應四時也上下相應而俱往來也六經之脈不結動也本末之寒溫之相守司也形肉血氣必相稱也少氣者脈口人迎俱少而不稱尺寸也如是者則陰陽俱不足補陽則陰竭瀉陰則陽脫可將以甘藥不愈可飲以至劑不已者因而瀉之則五藏氣壞矣春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨凡刺之禁新內勿刺新刺勿內已醉勿刺已刺勿醉新怒勿刺已刺勿怒新勞勿刺已刺勿勞已飽勿刺已刺勿飽已飢勿刺已刺勿飢已渴勿刺已刺勿渴太陽之脈其終也戴眼反折瘛瘲其色白絶皮乃絶汗絶汗則終矣少陽終者耳聾百節盡縱目系絶目系絶一日半則死矣其死也色青白乃死陽明終者口目動作喜驚妄言色黃其上下之經盛而不行則終矣少陰終者面黑齒長而垢腹脹閉塞上下不通而終矣厥陰終者中熱咽乾喜尿心煩甚則舌卷卵上縮而終矣太陰終者腹脹悶不得息氣噫善嘔嘔則逆逆則面赤不逆則上下不通上下不通則面黑皮毛焦而終矣經脈人始生先成精精成而腦髓生骨為幹脈為營筋為剛肉為牆皮膚堅而毛髮長谷入胃脈道以通血氣乃行經脈者所以能決死生處百病調虛實不可不通肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀音務此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息尿色變為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者則寸口反小於人迎也大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒栗不復為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也胃足陽明之脈起於鼻之交頞中旁納一本作約字太陽之脈下循鼻外上入齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循頸外廉下足跗入中指內間其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端是動則病灑灑振寒善呻數欠顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂虐溫淫汗出鼽衄口唇疹頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢尿色黃氣不足則身以前皆寒粟胃中寒則脹滿為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也脾足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上腨內循脛骨後交出厥陰之前上循膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者寸口反小於人迎心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺出腋下下循臑內後廉行太陰心主之後下肘內循臂內後廉抵掌後鋭骨之端入掌內後廉循小指之內出其端是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大再倍於人迎虛者寸口反小於人迎也小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目鋭皆卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩髆內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從髆內左右別下貫脾挾脊內過髀樞循髀外從後廉下合膕中以下貫踹內出外踝之後循京骨至小指之端外側是動則病沖頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭囟項痛目黃淚出鼽衄項背腰尻膕踹腳皆痛小指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也腎足少陰之脈起於小指之下斜走足心出於然谷之下循內踝之後別入跟中以上踹內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中是動則病飢不欲食面如漆柴咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之灸則強食生肉緩帶被髮大杖重履而步盛者寸口大再倍於人迎虛者寸口反小於人迎也心主手厥陰心包絡之脈起於胃中出屬心包絡下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下循臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散落心包下膈循屬三焦其支者從膻中上出缺盆上項挾耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目鋭眥是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目鋭眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也膽足少陽之脈起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者別鋭眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之端其支者別跗上入大指之間循大指歧骨內出其端還貫爪甲出三毛是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目鋭眥痛缺盆中腫痛腋下腫馬刀俠癭汗出振寒瘧胸脅肋髀膝外至脛絶骨外踝前及諸節皆痛小指次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也肝足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺是動則病腰痛不可以俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也手太陰氣絶則皮毛焦太陰者行氣溫於皮毛者也故氣不榮則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷則皮枯毛折毛折者則毛先死丙篤丁死火勝金也手少陰氣絶則脈不通脈不通則血不流血不流則毛色不澤故其面黑如漆柴者血先死壬篤癸死水勝火也足太陰氣絶者則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則唇反唇反者肉先死甲篤乙死水勝土也足少陰氣絶則骨枯少陰者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著骨也骨肉不相親則肉軟卻肉軟卻故齒長而垢發無澤發無澤者骨先死戊篤己死土勝水也足厥陰氣絶則筋絶厥陰者肝脈也肝者筋之合也筋者聚於陰器而脈絡於舌本也故脈弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝水也五陰氣俱絶則目系轉轉則目運目運者為志先死志先死則遠一日半死矣六陽氣俱絶則陰與陽相離離則腠理發泄絶汗乃出故旦占夕死夕占旦死經脈十二者伏行分肉之間深而不見其常見者足太陰過於內踝之上無所隱故也諸脈之浮而常見者皆絡脈也六經絡手陽明少陽之大絡起於五指間上合肘中飲酒者衛氣先行皮膚先充絡脈絡脈先盛故衛氣已平營氣乃滿而經脈大盛脈之卒然動者皆邪氣居之留於本末不動則熱不堅則陷且空不與衆同是以知其何脈之病也經脈者常不可見也其虛實也以氣口知之脈之見者皆絡脈也諸絡脈皆不能經大節之間必行絶道而出入復合於皮中其會皆見於外故凡診絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其暴黑者留久痹也其有赤有黑有青者寒熱氣也其青短者少氣也手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散入於魚際其病甚則手鋭掌熱虛則欠呿小便遺數取之去腕寸半別走陽明也手少陰之別名曰通里去腕一寸別而上行循經入於心中系舌本屬目系其實則支膈虛則不能言取之掌後一寸別走太陽也手心主之別名曰內關去腕二寸出於兩筋之間循經以上繫於心包絡心系實則心痛虛則為煩心取之兩筋間也手太陽之別名曰支正去腕五寸內注少陰其別者上走肘絡肩髃實則節弛肘廢虛則生疣小者如指痂疥取之所別也手陽明之別名曰偏歷去腕三寸別走太陰其別者上循臂乘肩髃上曲頰偏齒其別者入耳合於宗脈實則齲聾虛則齒寒痹隔取之所別也手少陽之別名曰外關去腕二寸外達臂注胸中合心主病實則肘攣虛則不收取之所別也足太陽之別名曰飛揚去踝七寸別走少陰實則鼽窒頭背痛虛則鼽衄取之所別也足少陽之別名曰光明去踝五寸別去厥陰並經下絡足跗實則厥虛則痿躄坐不能起取之所別也足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹瘁喑實則狂巔虛則足不收脛枯取之所別也足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腹中切痛虛則鼓脹取之所別也足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別者也足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者徑脛上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也任脈之別名曰尾翳下鳩尾散於腹實則腹皮痛虛則癢搔取之所別也督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂實則脊強虛則頭重高搖之挾脊之有過者取之所別也脾之大絡名曰大包出淵腋下三寸布胸脅實則身盡痛虛則百節盡皆縱此脈若羅絡之血者皆取之脾之大絡脈也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也經別足太陽之正別入於膕中其一道下尻五寸別入於肛屬於膀胱散之腎循膂當心入散直者從膂上出於項復屬於太陽此為一經也足少陰之正至膕中別走太陽而合上至腎當十四傾出屬帶脈直者系舌本復出於項合於太陽此為一合成以諸陰之別皆為正也足少陽之正繞髀入毛際合於厥陰別者入季脅之間循胸裡屬膽散之肝上貫心以上挾咽出頤頷中散於面系目系合少陽之外眥也足厥陰之正別跗上上至毛際合於少陽與別俱行此為二合也足陽明之正上至髀入於腹裡屬胃散之脾上通於心上循咽出於口上額䪼還系目系合於陽明也足太陰之正上至髀合於陽明與別俱行上結於咽貫舌中此為三合也手太陽之正指地別於肩解入腋走心系小腸也手少陰之正別入於淵腋兩筋之間屬於心上走喉嚨出於面合目內眥此為四合也手少陽之正指天別於巔入缺盆下走三焦散於胸中也手心主之正別下淵腋三寸入胸中別屬三焦出循喉嚨出耳後合少陽完骨之下此為五合也手陽明之正從手循膺乳別於肩髃入柱骨下走大腸屬於肺上循喉嚨出缺盆合於陽明也手太陰之正別入淵腋少陰之前入走肺散之太陽上出缺盆循喉嚨復合陽明此六合也經水足太陽外合於清水內屬於膀胱而通水道焉足少陽外合於渭水內屬於膽足陽明外合於海水內屬於胃足太陽外合於湖水內屬於脾足少陽外合於汝水內屬於腎足厥陰外合於澠水內屬於肝手太陽外合於淮水內屬於小腸而水道出焉手少陽外合於漯水內屬於三焦手陽明外合於江水內屬於大腸手太陰外合於河水內屬於肺手少陰外合於濟水內屬於心手心主外合於漳水內屬於心包凡此五臟六腑十二經水者外有源泉而內有所稟此皆內外相貫如環無端人經亦然故天為陽地為陰腰以上為天腰以下為地故海以北者為陰湖以北者為陰中之陰漳以南者為陽河以北至漳者為陽中之陰漯以南至江者為陽中之太陽此一隅之陰陽也所以人與天地相參也經筋足太陽之筋起於足小指上結於踝邪上結於膝其下循足外側結於踵上循跟結於膕其別者結於踹外上膕中內廉與膕中並上結於臀上挾脊上項其支者別入結於舌本其直者結於枕骨上頭下顏結於鼻其支者為目上網下結於頄其支者從腋後外廉結於肩髃其支者入腋下上出缺盆上結於完骨其支者出缺盆邪上出於頄其病小指支跟腫痛膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右搖治在燔針劫刺以知為數以痛為輸名曰仲春痹足少陽之筋起於小指次指上結外踝上循脛外廉結於膝外廉其支者別起外輔骨上走髀前者結於伏兔之上後者結於尻其直者上乘䏚季脅上走腋前廉繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄支者結於目眥為外維其病小指次指支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乘䏚季脅痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹻脈而行左絡於右故傷左角右足不用命曰維筋相交治在燔針劫刺以知為數以痛為輸名曰孟春痹也足陽明之筋起於中三指結於跗上邪外上加於輔骨上結於膝外廉直上結於髀樞上循脅屬脊其直者上循髀結之於尻其支者結於外輔骨合少陽其直者上循伏兔上結於髀聚於陰器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上網陽明為目下網其支者從頰結於耳前其病足中指支脛轉筋腳跳堅伏兔轉筋髀前腫潰疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑灰置之坎中高下以坐等以膏尉急頰且飲美酒啖美炙肉不飲酒者自強也為之三拊而已治在燔針劫刺以知為數以痛為輸名曰季春痹也足太陰之筋起於大指之端內側上結於內踝其直者絡於膝內輔骨上循陰股結於髀聚於陰器上腹結於臍循腹裡結於肋散於胸中其內者著於脊其病足大指支內踝痛轉筋痛膝內輔骨痛陰股引髀而痛陰器紐痛下引臍兩脅痛引膺中脊內痛治在燔針劫刺以知為數以痛為輸命曰孟秋痹也足少陰之筋起於小指之下並足太陰之筋邪走內踝之下結於踵與太陽之筋合而上結於內輔之下並太陰之筋而上循陰股結於陰器循脊內挾膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癇瘛及痙以外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰治在燔針劫刺以知為數以痛為輸在內者尉引飲藥此筋所紐紐發數甚者死不治名曰仲秋痹也足厥陰之筋起於大指之上上結於內踝之前上循脛上結內輔之下上循陰股結於陰器絡諸筋其病足大指支內踝之前痛內輔痛陰股痛轉筋陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣其病轉筋者治在燔針劫刺以知為數以痛為輸命曰季秋痹也手太陽之筋起於小指之上結於腕上循臂內廉結於肘內鋭骨之後彈之應小指之上結於腋下其支者後走腋後廉上繞肩胛循脛出走太陽之前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外眥其病小指支肘內鋭骨後廉痛循臂陰入腋下腋下痛腋後廉痛繞肩胛引頸而痛應耳中鳴痛引頷目瞑良久乃得視頸筋急則為筋痿頸腫寒熱在頸者治在燔針劫刺之以知為數以痛為輸其為腫者復而鋭之本支者上曲牙循耳前屬目外眥上頷結於角其痛當所過者支轉筋治在燔針劫刺以知為數以痛為輸名曰仲夏痹也手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外廉上肩走頸合手太陽其支者當曲頰入系舌本其支者上曲牙循耳前屬目外眥上乘頷結於角其病當所過者即支轉筋舌卷治在燔針劫刺以知為數以痛為輸名曰季夏痹也手陽明之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃其支者繞肩胛挾脊直者從肩髃上頸其支者上頰結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視治在燔針劫刺以知為數以痛為輸名曰孟夏痹也手太陰之筋起於大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑內廉入腋下出缺盆結肩前髃上結缺盆下結胸裡散貫賁合賁下抵季脅其病當所過者支轉筋痛甚成息賁脅急吐血治在燔針劫刺以知為數以痛為輸名曰仲冬痹也手心主之筋起於中指與太陰之筋並行結於肘內廉上臂陰結腋下下散前後挾脅其支者入腋散胸中結於賁其病當所過者支轉筋前及胸痛息賁治在燔針劫刺以知為數以痛為輸名曰孟冬痹也手少陰之筋起於小指之內側結於鋭骨上結肘內廉下入腋交太陰挾乳里結於胸中循臂下繫於臍其病內急心承伏梁下為肘網其病當所過者支轉筋筋痛治在燔針劫刺以知為數以痛為輸其成伏梁唾血膿者死不治經筋之病寒則反折筋急熱則筋弛縱不收陰痿不用陽急則反折陰急則俯不伸焠刺者刺寒急也熱則筋縱不收無用燔針名曰季冬痹也足之陽明手之太陽筋急則口目為噼目眥急不能卒視治皆如上方也骨度頭之大骨圍二尺六寸胸圍四尺五寸腰圍四尺二寸發所復者顱至項尺二寸發以下至頤長一尺男子參折結喉以下至缺盆中長四寸缺盆以下至𩩲骬長九寸過則肺大不滿則肺小𩩲骬以下至天樞長八寸過則胃大不及則胃小天樞以下至橫骨長六寸半過則回腸廣長不滿則狹短橫骨長六寸半橫骨上廉以下至內輔之上廉長一尺八寸內輔之上廉長一尺八寸內輔之上廉以下至下廉長三寸半內輔下廉下至內踝長一尺三寸內踝以下至地長三寸膝膕以下至跗屬長一尺六寸跗屬以下至地長三寸故骨圍大則大過小則不及角以下至柱骨長一尺行腋中不見者長四寸腋以下至季脅長一尺二寸季脅以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺三寸兩顴之間相去七寸兩乳之間廣九寸半兩髀之間廣六寸半足長一尺二寸廣四寸半肩至肘長一尺七寸肘至腕長一尺二寸半腕至中指本節長四寸本節至其末長四寸半項發以下至膂骨長三寸半膂骨以下至尾骶二十一節長三尺上節長一寸四分分之一奇分在下故上七節至於膂骨九寸八分分之七此衆人骨之度也所以立經脈之長短也是故視其經脈之在於身也其見浮而堅其見明而大者多血細而沉者多氣也五十營天周二十八宿宿三十六分人氣行一周千八分日行二十八宿人經脈上下左右前後二十八脈周身十六丈二尺以應二十八宿漏水下百刻以分晝夜故人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺日行二分二百七十息氣行十六丈二尺氣行交通於中一周於身下水二刻日行二十五分有奇五百四十息氣行再周於身下水四刻日行四十分二千七百息氣行十周於身下水二十刻日行五宿二十分一萬三千五百息氣行五十營於身水下百刻日行二十八宿漏水皆盡脈終矣所謂交通者並行一數也故五十營備得盡天地之壽矣氣凡行八百一十丈也營氣營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始是謂天地之紀故氣從太陰出注手陽明上行至面注足陽明下行至跗上注大指間與太陰合上行抵髀從脾注心中循手少陰出腋下臂注小指之端合手太陽上行乘腋出䪼內注目內眥上巔下項合足太陽循脊下尻下行注小指之端循足心注足少陰上行注腎從腎注心外散於胸中循心主脈出腋下臂出兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行注膻中散於三焦從三焦注膽出脅注足少陽下行至跗上復從跗注大指間合足厥陰上行至肝從肝上注肺上循喉嚨入頏顙之竅究於畜門其支別者上額循巔下項中循脊入骶是督脈也絡陰器上過毛中入臍中上循腹裡入缺盆下注肺中復出太陰此營氣之所行也逆順之常也脈度手之六陽從手至頭長五尺五六三丈手之六陰從手至胸中三尺五寸三六一丈八尺五六三尺合二丈一尺足之六陽從足上至頭八尺六八四丈八尺足之六陰從足至胸中六尺五寸六六三丈六尺五六三尺合三丈九尺蹻脈從足至目七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各四尺五寸二四八尺二五一尺合九尺凡都合一十六丈二尺此氣之大經隧也經脈為里支而橫者為絡絡之別者為孫絡孫絡之盛而血者疾誅之盛者瀉之虛者飲藥以補之五臟常內閲於上七竅也故肺氣通於鼻肺和則鼻能知臭香矣心氣通於舌心和則舌能知五味矣肝氣通於目肝和則目能辨五色矣脾氣通於口脾和則口能知五穀矣腎氣通於耳腎和則耳能聞五音矣五臟不和則七竅不通六腑不和則留結為癰故邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰脈不和陰脈不和則血留之血留之則陰氣盛矣陰氣太盛則陽氣不能榮也故曰關陽氣太盛則陰氣弗能榮也故曰格陰陽俱盛不得相榮故曰關格關格者不得盡期而死也蹻脈者少陰之別起於然骨之後上內踝之上直上循陰股入陰上循胸裡入缺盆上出入迎之前入頄屬目內眥合於太陽陽蹻而上行氣井相還則為濡目氣不榮則目不合氣之不得無行也如水之流如日月之行不休故陰脈榮其藏陽脈榮其腑如環之無端莫知其紀終而復始其流溢之氣內溉臟腑外濡腠理蹻脈有陰陽何脈當其數男子數其陽女子數其陰當數者為經其不當數者為絡也營衛生會入受氣於谷谷入於胃以傳與肺五臟六腑皆以受氣其清者為營濁者為衛營在脈中衛在脈外營周不休五十而復大會陰陽相貫如環無端衛氣行於陰二十五度行於陽二十五度分為晝夜故氣至陽而起至陰而止故曰日中而陽隴為重陽夜半而陰隴為重陰故太陰主內太陽主外各行二十五度分為晝夜夜半為陰隴夜半後而為陰衰平旦陰盡而陽受氣矣日中而陽隴日西而陽衰日入陽盡而陰受氣矣夜半而大會萬民皆臥命曰合陰平旦陰盡而陽受氣如是無已與天地同紀壯者之氣血盛其肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之血氣衰其肌肉枯氣道澀五臟之氣相搏其營氣衰少而衛氣內伐故晝不精夜不眠營出於中焦衛出於下焦上焦出於胃上口並咽以上貫膈而布胸中走腋循太陰之分而行還至陽明上至舌下足陽明常與營俱行於陽二十五度行於陰亦二十五度一周也故五十度而復大會於手太陰矣中焦亦並胃口出上焦之後此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣營衛者精氣也血者神氣也故血之與氣異名同類焉故奪血者無汗奪汗者無血下焦者別回腸注於膀胱而滲入焉故水穀者常並居於胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉酒者熟谷之液也其氣悍以清故後谷而入先谷而液出焉上焦如霧中焦如漚下焦如瀆五邪邪在肺則病皮膚痛寒熱上氣喘汗出咳動肩背邪在肝則兩脅中痛寒中惡血在內胻善掣節時腳踵邪在脾胃則病肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛陰陽俱有餘若俱不足則有寒有熱邪在腎則病骨痛陰痹陰痹者按之而不得腹脹腰痛大便難肩眥頸項痛時眩邪在心則病心痛喜悲時眩僕病本先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後中滿者治其標先病後泄者治其本先中滿而後煩心者治其本有客氣有同氣大小便不利治其標大小便利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本謹詳察間甚以意調之間者並行甚者獨行先小便大便不利而後生他病者治其本也口問夫百病之始生也皆生於風雨寒暑陰陽喜怒飲食居處大驚卒恐則血氣分離陰陽破敗經絡厥絶脈道不通陰陽相逆衛氣稽留經脈虛空血氣不次乃失其常衛氣晝日行於陽夜半則行於陰衛者主夜夜者主臥陽者主上陰者主下故陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數欠陽氣盡陰氣盛則目瞑陰氣盡而陽氣盛則寤矣人之噦者谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦人之唏者此陰氣盛而陽氣虛陰氣疾而陽氣徐陰氣盛而陽氣絶故為唏人之振寒者寒氣客於皮膚陰氣盛陽氣虛故為振寒寒栗人之噫者寒氣客於胃厥逆從下上散復出於胃故為噫人之嚏者陽氣和利滿於心出於鼻故為嚏人之嚲者胃不實則諸脈虛諸脈虛則筋脈懈惰筋脈懈惰則行陰用力氣不能復故為嚲人之哀而涕泣出者心者五臟六腑之主也目者宗脈之所聚也上液之道也口鼻者氣之門戶也故悲哀之所聚也上液之道也口鼻者氣之門戶也故悲哀悉憂則心動心動則五臟六腑皆搖搖則宗脈感宗脈感則液道開液道開故涕泣出焉液者所以灌精濡空竅者也故上液之道開則泣泣不止則液竭液竭則精不灌精不灌則目無所見矣故命曰奪精人之大息者憂思則心系急心系急則氣道約約則不利故太息以伸出之人之涎下者飲食者皆入於胃胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下人之耳中鳴者耳者宗脈之所聚也故胃中空則宗脈虛虛則下溜脈有所竭者故耳鳴人之自齧舌者此厥逆走上脈氣輩至也少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇矣凡此十二邪者皆奇邪之走空竅者也故邪之所在皆為不足故上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之苦眩中氣不足胃為之變腸為之苦鳴下氣不足則乃為痿厥心悗腎主為欠取足少陰肺主為噦取手太陰足少陰唏者陰與陽絶故補足太陽瀉足少陰振寒者補諸陽噫者補足太陰陽明嚏者補足太陽眉本嚲因其所在補分肉間泣出補天柱經俠頸俠頸者頭中分也大息補手少陰心主足少陽留之涎下補足少陰耳鳴補客主人手大指爪甲上與肉交者自齒舌視主病者則補之目眩頭傾補足外踝下留之痿厥心悗刺足大指間上二寸留之一日足外踝下留之師傳春夏先治其標後治其本秋冬先治其本後治其標飲食衣服亦欲適寒溫寒無悽愴暑無出汗食飲者熟無灼灼寒無滄滄寒溫中適故氣將持乃不致邪僻也五臟者肺為之蓋巨肩陷咽候見其外心為之主缺盆為之道䯏骨有餘以候𩩲骬肝者主為將使之候外欲知堅固視目小大脾者主為衛使之迎糧視唇舌好惡以知吉凶腎者主為外使之遠聽視耳好惡以知其性六腑者胃為之海廣骸在頸張胸五穀乃容鼻遂以長以候大腸唇厚人中長以候小腸目下果大其膽乃橫鼻孔在外膀胱漏泄鼻柱中央起三焦乃約決氣兩神相搏合而成形常先身生是謂精上焦開發宣五穀味熏膚充身澤毛謂霧露之溉是謂氣腠理發泄汗出溱溱是謂津谷入氣滿淖澤注於骨骨屬屈伸泄澤補益腦髓皮膚潤澤是謂液中焦受氣取汁變化而赤是謂血壅遏營氣令無所避是謂脈精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛酸耳數鳴血脫者色白夭然不澤其脈空虛此其候也腸胃谷所從出入淺深遠近長短之度唇至齒長九分口廣二寸半齒以後至會厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣二寸半至胃長一尺六寸胃紆曲屈伸之長二尺六寸大一尺五寸徑五寸大容三斗五升小腸後附脊左環回周疊積其注於回腸者外附於臍上回運環十六曲大二寸半徑八分分之少半長三丈三尺回腸當臍左環回周葉積而下回運環反十六曲大四寸徑一寸寸之少半長二丈一尺廣腸傳脊以受回腸左環葉脊上下闢大八寸徑二寸寸之大半長二尺八寸腸胃所入至所出長六丈四寸四分回曲環反三十二曲也平人絶谷胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中之谷常留二斗水一斗五升而滿上焦泄氣出其精微剽悍滑疾下焦下溉諸腸小腸大二寸半徑八分分之少半長三丈二尺受谷二斗四升水六升三合合之大半回腸大四寸徑一寸寸之少半長二丈一尺受谷一斗水七升半廣腸大八寸徑二寸寸之大半長二尺八寸受谷九升三合八分合之一腸胃之長凡五丈八尺四寸受水穀九斗二升一合合之大半此腸胃所受水穀之數也平人則不然胃滿則腸虛腸滿則胃虛更虛更滿故氣得上下五臟安定血脈和則精神乃居故神者水穀之精氣也故腸胃之中常留谷二斗水一斗五升故平人日再後後二升半一日中五升七日五七三斗五升而留水穀盡矣故平人不食飲七日而死者水穀精氣津液皆盡故也海論人有髓海有血海有氣海有水穀之海胃者水穀之海其輸上在氣街下至三里衝脈者為十二經之海其輸上在於大杼下出於巨虛之上下廉膻中者為氣之海其輸上在於柱骨之上下前在於人迎腦為髓之海其輸上在於其蓋下在風府凡此四海者得順者生得逆者敗知調者利不知調者害氣海有餘者氣滿胸中悗急息面赤氣海不足則氣少不足以言血海有餘則常想其身大怫然不知其所病血海不足亦常想其身小狹然不知其所病水穀之海有餘則腹滿水穀之海不足則飢不受穀食髓海有餘則輕徑多力自過其度髓海不足則腦轉耳鳴脛酸眩冒目無所見懈怠安臥五亂經脈十二者以應十二月其氣各異營衛相隨陰陽已和清濁不相干如是則順之而治清氣在陰濁氣在陽營氣順脈衛氣逆行清濁相干亂於胸中是謂大悗故氣亂於心則煩心密默俯首靜伏亂於肺則俯仰喘喝接手以呼亂於腸胃則為霍亂亂於臂脛則為四厥亂於頭則為厥逆頭重眩僕脹論夫胸腹者藏腑之郭也膻中者心主之宮城也胃者太倉也咽喉小腸者傳送也胃之五竅者閭里門戶也廉泉玉英者津液之道也故五臟六腑者各有畔界其病各有形狀夫心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飧不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息衛氣之在身也常然並脈循分肉行有逆順陰陽相隨乃得天和五臟更始四時有序五穀乃化然後厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹也五癃津液別水穀皆入於口其味有五各注其海津液各走其道故三焦出氣以溫肌肉充皮膚為其津其流而不行者為液天暑衣厚則腠理開故汗出寒留於分肉之間聚沫則為痛天寒則腠理閉氣濕不行水下留於膀胱則為尿與氣五臟六腑心為之主耳為之聽目為之候肺為之相肝為之將脾為之衛腎為之主外故五臟六腑之津液盡上滲於目心悲氣並則心系急心系急則肺舉肺舉則液上溢夫心系與肺不能常舉乍上乍下故咳而泣出矣中熱則胃中消穀消穀則蟲上下作腸胃充郭故胃緩胃緩則氣逆故唾出五穀之精液和合而為膏者內滲入於骨空補益腦髓而下流於陰股陰陽不和則使液溢而下流於陰隨液皆減而下下過度則虛虛故腰背痛而脛酸陰陽氣道不通四海閉塞三焦下不瀉津液不化水穀並於腸胃之中別於回腸留於下焦不得滲膀胱則下焦脹水溢則為水脹此津液五別之逆順也五閲五使鼻者肺之官目者肝之官口唇者脾之官舌者心之官耳者腎之官故肺病者喘息鼻張肝病者眥青脾病者唇黃心病者舌卷短顴赤腎病者顴與顏黑陰陽清濁受谷者濁受氣者清清者注陰濁者注陽濁而清者上出於咽清而濁者則下行清濁相干命曰亂氣氣之大別清者上注於肺濁者下走於胃胃之清氣上出於口肺之濁氣下注於經內積於海手太陽獨受陽之濁手太陰獨受陰之清其清者上走空竅其濁者下行諸經諸陰皆清足太陰獨受其濁清者其氣滑濁者其氣澀此氣之常也
