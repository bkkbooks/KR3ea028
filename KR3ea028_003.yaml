不可勝論其著孫絡之脈而成積者其積往來上下臂手孫絡之居也浮而緩不能句積而止之故往來移行腸胃之間水湊滲注灌濯濯有音有寒則䐜脹滿雷引故時切痛其著於陽明之經則挾臍而居飽食則益大飢則益小其著手緩筋也似陽明之積飽食則痛飢則安其著於腸胃之募原也痛外連於緩筋飽食則安飢則痛於伏沖之脈者揣之應手而動發手則熱氣下於兩股如湯沃之狀其著於膂筋在腸後者飢則積見飽則積不見按之不得其著於輸之脈者閉塞不通津液不下孔竅乾壅此邪氣之從外入內從上下也積之始生得寒乃生厥乃成積也厥氣生足悗悗生脛寒脛寒則血脈凝澀血脈凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外傷外有寒汁沫與血相搏則併合凝聚不得散而積成矣卒然外中於寒若內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行凝結蘊里而不散津液澀滲著而不去而積皆成矣憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出浴則傷腎此內外三部之所生病者也察其所痛以知其應有餘不足當補則補當瀉則瀉毋逆天時是謂至治行針重陽之人熇熇高高言語善疾舉足善高心肺之臟氣有餘陽氣滑盛而揚故神動而氣先行此人頗有陰者也多陽者多喜多陰者多怒數怒者易解故曰頗有陰其陰陽之離合難故其神不能先行也上膈喜怒不適飲食不節寒溫不時則寒汁流於腸中流於腸中則蟲寒蟲寒則積聚守於下管則腸胃充郭衛氣不營邪氣居之人食則蟲上食蟲上食則下管虛下管虛則邪氣勝之積聚以留留則癰成癰成則下管約其癰在管內者即而痛深其癰在外者則癰外而痛浮癰上皮熱憂恚無言咽喉者水穀之道也喉嚨者氣之所以上下者也會厭者音聲之戶也口唇者音聲之扇也舌者音聲之機也懸雍垂者音聲之關也頏顙者氣分之所泄也橫骨者神氣所使主發舌者也故人之鼻洞涕出不收者頏顙不開分氣失也是故厭小而薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其氣出遲故重言也人卒然無音者寒氣客於厭則厭不能發發不能下至其開闔不致故無音寒熱鼠瘻之本皆在於臟其末上出於頸腋之間其浮於脈中而未內著於肌肉而外為膿血者易去也反其目視之其中有赤脈上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲而死見赤脈不下貫瞳子可治也邪客夫邪氣之客人也或令人目不瞑不臥出者何氣使然五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心肺而行呼吸焉營氣者泌其津液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉衛氣者出其悍氣之剽疾而先行於四末分肉皮膚之間而不休者也晝日行於陽夜行於陰常從足少陰之分間行於五臟六腑則衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹻滿不得入於陰陰虛故目不瞑也人之肢節以應天地天圓地方人頭圓足方以應之天有日月人有兩目地有九州人有九竅天有風雨人有喜怒天有雷電人有音聲天有四時人有四肢天有五音人有五臟天有六律人有六腑天有冬夏人有寒熱天有十日人有手十指辰有十二人有足十指莖垂以應之女子不足二節以抱人形天有陰陽人有夫妻歲有三百六十五日人有三百六十節地有高山人有肩膝地有深谷人有腋膕地有十二經水人有十二經脈地有泉脈人有衛氣地有草蓂人有毫毛天有晝夜人有臥起天有列星人有牙齒地有小山人有小節地有小石人有高骨地有林木人有募筋地有聚邑人有㿉肉歲有十二月人有十二節地有四時不生草人有無子此人與天地相應者也手太陰之脈出於大指之端內屈循白肉際至本節之後大淵留以淡外屈上於本節之下內屈與陰諸絡會於魚際數脈並注其氣滑利伏行壅骨之下外屈出於寸口而行上至於肘內廉入於大筋之下內屈上行臑陰入腋下內屈走肺此順行逆數之屈折也心主之脈出於中指之端內屈循中指內廉以上留下常中伏行兩骨之間外屈出兩筋之間骨肉之際其氣滑利上三寸外屈出行兩筋之間上至肘內廉入於小筋之下留兩骨之會上入於胸中內絡於心脈少陰心脈也心者五臟六腑之大主也精神之所舍也其藏堅固邪弗能容也容之則傷心心傷則神去神去則死矣故諸邪之在於心者皆在於心之包絡包絡者心主之脈也故獨無腧焉其外經病而藏不病故獨取其經於掌手鋭骨之端其餘脈出入屈折其行之徐疾皆如手少陰心主之脈行也故本腧者皆因其氣之虛實疾徐以取之是謂因沖而瀉因衰而補如是者邪氣得去真氣堅固是謂因天之序必先明知十二經脈之本末皮膚之寒熱脈之盛衰滑澀其脈滑而盛者病日進虛而細者久以持太以澀者為痛痹陰陽如一者病難治其本末尚熱者病尚在其熱以衰者其病亦去矣持其尺察其肉之堅脆小大滑澀寒溫燥濕因視目之五色以知五臟而決死生視其血脈察其色以知其寒熱痛痹肺心有邪其氣留於兩肘肝有邪其氣流於兩腋脾有邪其氣留於兩髀腎有邪其氣留於兩膕凡此八虛者皆機關之室真氣之所過血絡之所遊邪氣惡血固不得住留住留則傷經絡骨節機關不得屈伸故病攣也通天太陰之人貪而不仁下齊湛湛好內而惡出心抑而不發不務於時動而後之少陰之人小貪而賊心見人有亡常若有得好傷好害見人有榮乃反慍怒心疾而無恩太陽之人居處於於好言大事無能而虛說志發於四野舉措不顧是非為事如常自用事雖敗而無常悔少陽之人諟諦好自貴有小小官則高自宣好為外交而不內附陰陽和平之人居處安靜無為懼懼無為欣欣婉然從物或與不爭與時變化尊則謙謙談而不治是謂至治太陰之人多陰而無陽其陰血濁其衛氣澀陰陽不和緩筋而厚皮不之疾瀉不能移之少陰之人多陰少陽小胃而大腸六腑不調其陽明脈小而太陽脈大必審而調之其血易脫其氣易敗也太陽之人多陽而少陰必謹調之無脫其陰而瀉其陽陽重脫者易狂陰陽皆脫者暴死不知人也少陽之人多陽而少陰經小而絡大血在中而氣在外實陰而虛陽獨瀉其絡脈則強氣脫而疾中氣不足病不起也陰陽和平之人共陰陽之氣和血脈調宜謹診其陰陽視其邪正安其容儀審有餘不足盛則瀉之虛則補之不盛不虛以經取之太陰之人其狀黮黮然黑色念然下意臨臨然長大膕然未僂少陰之人其狀清然竊然固以陰賊立而躁嶮行而似狀太陽之人其狀軒軒儲儲反身折膕少陽之人其狀立則好仰行則好搖其兩臂兩肘則常出於背陰陽和平之人其狀委委然隨隨然顒顒然愈愈然䁢䁢然豆豆然衆人皆曰君子論疾診尺審其尺之緩急小大滑澀肉之堅脆而病形定矣視人之目窠上微癰如新臥起狀其頸脈動時咳按其手足上窅而不起者風水膚脹也尺膚滑其淖澤者風也尺肉弱者解㑊安臥脫肉者寒熱不治尺膚滑而澤脂者風也尺膚澀者風痹也尺膚粗如枯魚之鱗者水泆飲也尺膚熱甚脈盛躁者病溫也其脈盛而滑者病且出也尺膚寒其脈小者泄少氣他尺膚炬燃先熱後寒者寒熱也尺膚先寒久持之而熱者亦寒熱也肘所獨熱者腰以上熱手所獨熱者腰以下熱肘前獨熱者膺前熱肘後獨熱者肩背熱臂中獨熱者腰腹熱肘後廉以下三四寸熱者腸中有蟲掌中熱者腹中熱掌中寒者腹中寒魚上白肉有青血脈者胃中有寒尺炬然熱人迎大者當奪血尺堅人迎脈小甚少氣悗有加立死目赤色者病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胃中診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病診寒熱赤脈上下至瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死診齲齒痛按其陽之來有過者獨熱在左左熱在右右熱在上上熱在下下熱診血脈者多赤多熱多青多痛多黑多久痹多赤多黑多青皆見者寒熱身痛而色微黃齒垢黃爪甲上黃黃疸也安臥小便黃赤脈小而澀者不嗜食人病其寸口之脈與人迎之脈小大等及其浮沉等者病難已也女子手少陰脈動甚者妊子嬰兒病其頭毛皆逆上者必死耳間青脈起者掣痛大便赤瓣飧泄脈小者手足寒難已飧泄脈小手足溫泄易已四時之變寒暑之勝重陰必陽重陽必陰故陰主寒陽主熱故寒甚則熱熱甚則寒故曰寒生熱熱生寒此陰陽之變也故曰冬傷於寒春生疸熱春傷於風夏生後泄腸澼夏傷於暑秋生痎瘧秋傷於濕冬生咳嗽是謂四時之序也刺節真邪真氣者所受於天與穀氣並而充身者也正氣者正風也從一方來非實風又非虛風也邪氣者虛風之賊傷人也其中人也深不能自去其氣來柔弱不能勝真氣故自去虛邪之中人也灑淅動形起毫毛而發腠理其入深內搏於骨則為骨痹搏於筋則為筋攣搏於脈中則為血閉不通則為癰搏於肉與衛氣相搏陽勝者則為熱陰勝者則為寒寒則真氣去去則虛虛則寒搏於皮膚之間其氣外發腠理開毫毛搖氣往來行則為癢留而不去為痹衛氣不行則為不仁虛邪偏客於身半其入深內居榮衛榮衛稍衰則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛虛邪之入於身也深寒與熱相搏久留而內著寒勝其熱則骨疼內枯熱勝其寒則爛肉腐肌為膿內傷骨內傷骨為骨蝕有所結中於筋筋屈不得伸邪氣居其間而不反發為筋瘤有所結氣歸之衛氣留之不得復發津液久留合而為腸溜久者數歲乃成以手按之柔有所結氣歸之津液留之邪氣中之凝結日以易甚連以聚居為昔瘤以手按之堅有所結深中骨氣因於骨骨與氣並日以益大則為骨瘤有所結中於肉宗氣歸之邪留而不去有熱則化而為膿無熱則為肉瘤凡此數氣者其發無常處而有常名也衛氣行歲有十二月日有十二辰子午為經卯酉為緯天周二十八宿而一面七星四七二十八星房昴為緯虛張為經是故房至畢為陽昴至心為陰陽主晝陰主夜故衛氣之行一日一夜五十周於身晝日行於陽二十五周夜行於陰二十五周周於五臟是故平旦陰盡陽氣出於目目張則氣上行於頭循項下足太陽循背下至小指之端其散者別於目鋭眥下手太陽下至手小指之間外側其散者別於目鋭眥下足少陽注小指次指之間以上循手少陽之分側下至小指之間別者以上至耳前合於頷脈注足陽明以下行至跗上入五指之間其散者從耳下下手陽明入大指之間入掌中其至於足也入足心出內踝下行陰分復合於目故為一周是故日行一舍人氣行一周與十分身之八日行二舍人氣行三周於身與十分身之六日行三舍人氣行於身五周與十分身之四日行四舍人氣行於身七周與十分身之二日行五舍人氣行於身九周日行六舍人氣行於身十周與十分身之八日行七舍人氣行於身十二周在身與十分身之六日行十四舍人氣二十五周於身有奇分與十分身之二陽盡於陰陰受氣矣其始入於陰常從足少陰注於腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎為周是故夜行一舍人氣行於陰臟一周與十分臟之八亦如陽行之二十五周而復合於目陰陽一日一夜合有奇分十分身之二與十分臟之二是故人之所以臥起之時有早晏者奇分不盡故也分有多少日有長短春秋冬夏各有分理然後常以平旦為紀以夜盡為始是故一日一夜水下百刻二十五刻者半日之度也水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在陰分水下五刻人氣在太陽水下六刻人氣在少陽水下七刻人氣在陽明水下八刻人氣在陰分水下九刻人氣在太陽水下十刻人氣在少陽水下十一刻人氣在陽明水下十二刻人氣在陰分水下十三刻人氣在太陽水下十四刻人氣在少陽水下十五刻人氣在陽明水下十六刻人氣在陰分水下十七刻人氣在太陽水下十八刻人氣在少陽水下十九刻人氣在陽明水下二十刻人氣在陰分水下二十一刻人氣在太陽水下二十二刻人氣在少陽水下二十三刻人氣在陽明水下二十四刻人氣在陰分水下二十五刻人氣在太陽此半日之度也從房至畢一十四舍水下五十刻日行半度回行一舍水下三刻與七分刻之四大要曰常以日之加於宿上也人氣在太陽是故日行一舍人氣行三陽與陰分常如是無已與天地同紀紛紛𤽉𤽉終而復始一日一夜水下百刻而盡矣九宮八風立秋二玄婁西南方秋分七倉果西方立冬六新洛西北方夏至九上天南方招搖中央冬至一葉蟄北方立夏四陰洛東南方春分三倉門東方立春八天留東北方太一常以冬至之日居葉蟄之宮四十六日明日居天留四十六日明日居倉門四十六日明日居陰洛四十五日明日居天宮四十六日明日居玄委四十六日明日居倉果四十六日明日居新洛四十五日明日復居蟄之宮曰冬至矣太一日遊以冬至之日居葉蟄之官數所在日從一日至九日復反於一常如是無已終而復始太一移日天必應之以風雨以其日風雨則吉歲美民安少病矣先之則多雨後之則多旱太一在冬至之日有變占在君太一在春分之日有變占在相太一在中宮之日有變占在吏太一在秋分之日有變占在將太一在夏至之日有變占在百姓太一居五宮之日病風折樹木揚沙石各以其所主占貴賤因視風所從來而占之風從其所居之鄉來為實風主生長養萬物從其沖後來為虛風其傷人者也主殺主害者謹候虛風而避之故聖人曰避虛邪之道如避矢石然邪弗能害此之謂也是故太一人徙立於中宮乃朝八風以占吉凶也風從南方來名曰大弱風其傷人也內舍於心外在於脈氣主熱風從西南方來名曰謀風其傷人也內舍於脾外在於肌其氣主為弱風從西方來名曰剛風傷人也內舍於肺外在於皮膚其氣主為燥風從西北方來名曰折風其傷人也內舍於小腸外在於手太陽脈脈絶則溢脈閉則結不通善暴死風從北方來名曰大剛風其傷人也內舍於腎外在於骨與肩背之膂筋其氣主為寒也風從東北方來名曰凶風其傷人也內傷於大腸外在於兩脅腋骨下及肢節風從東方來名曰嬰兒風其傷人也內舍於肝外在於筋紐共氣主為身濕風從東南方來名曰弱風其傷人也內舍於胃外在肌肉其氣主體重此八風皆從其虛之鄉來乃能病人三虛相搏則為暴病卒死兩實一虛病則為淋露寒熱犯其雨濕之地則為痿故聖人避風如避矢石焉其有三虛而偏中於邪風則為擊僕偏枯矣九針論一者天也天者陽也五臟之應天者肺也五臟六腑之蓋也皮者肺之合也人之陽也二者地也人之所以應土者肉也三者人也人之所以成生者血脈也四者時也時者四時八風之客於經絡之中為痼病者也五者音也音者冬夏之分分於子午陰與陽別寒與熱爭兩氣相搏合為癰膿者也六者律也律者調陰陽四時而合十二經脈虛邪客於經絡而為暴痹者也七者星也星者人之七竅邪之所客於經而為痛痹舍於經絡者也八者風也風者人之股肱八節也八正之虛風八風傷人內舍於骨解腰脊節腠理之間為深痹也九者野也野者人之節解皮膚之間也淫邪流溢於身如風水之狀而溜不能過於機關大節者也請言身形之應九野也左足應立春其日戊寅已醜左脅應春分其日乙卯左手應立夏其日戊辰己已膺喉首頭應夏至其日丙午右手應立秋其日戊申已未右脅應秋分其日辛酉右足應立冬其日戊戌己亥腰尻下竅應冬至其日壬子六腑膈下三臟應中州其大禁大禁太一所在之日及諸戊已凡此九者善候八正所在之處所主左右上下身體有癰腫者欲治之無以其所直之日潰治之是謂大忌日也形樂志苦病生於脈治之以灸刺形苦志樂病生於筋治之以尉引形樂志樂病生於肉治之以針石形苦志苦病生於咽喝治之以甘藥形數驚恐筋脈不通病生於不仁治之以按摩醪藥是謂五形志也五臟氣心主噫肺主咳肝主語脾主吞腎主缺六府氣膽為怒胃為氣逆噦大腸小腸為泄膀胱不約為遺尿下焦溢為水五味所入酸入肝辛入肺苦入心甘入脾鹹入腎淡入胃是謂五入五並精氣並肝則憂並心則喜並肺則悲並腎則恐並脾則畏是謂五精之氣並於臟也五惡肝惡風心惡熱肺惡寒腎惡燥脾惡濕此五臟氣所惡也五液心主汗肝主泣肺主涕腎主唾脾主涎此五液所出也五勞久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋此五久勞所病也五走酸走筋辛走氣苦走血咸走骨甘走肉是謂五走也五裁病在筋無食酸病在氣無食辛病在骨無食鹹病在血無食苦病在肉無食甘口嗜而欲食之不可多也必自裁也命曰五裁五發陰病發於骨陽病發於血以味病發於氣陽病發於冬陰病發於夏五邪邪入於陽則為狂邪入於陰則為血痹邪入於陽轉則為顛疾邪入於陰轉則為喑陽入之於陰病靜陰出之於陽病喜怒五藏心藏神肺藏魄肝藏魂脾藏意腎藏精志也五主心主脈肺主皮肝主筋脾主肌腎主骨陽明多血多氣太陽多血少氣少陰多氣少血足陽明太陽為表裡少陽厥陰為表裡太陽少陰為表裡是謂足之陰陽也手陽明太陰為表裡少陽心主為表裡太陽少陰為表裡是謂手之陰陽也歲露論夏日傷暑秋病瘧瘧之發以時其故何也邪客於風府病循膂而下衛氣一日一夜常大會於風府其明日日下一節故其日作晏此其先客於脊背也故每至於風府則腠理開腠理開則邪氣入邪氣入則病作此所以日作尚晏也衛氣之行風府日下一節二十一日下至尾底二十二日入脊內注於伏沖之脈其行九日出於缺盆之中其氣上行故其病稍益早其內搏於五臟橫連募原其道遠其氣深其行遲不能日作故次日乃蓄積而作焉風府無常衛氣之所應必開其腠理氣之所舍節則其府也人與天地相參也與日月相應也故月滿則海水西盛人血氣積肌肉充皮膚致毛髮堅腠理郤煙垢著當是之時雖遇賊風其人淺不深至其月郭空則海水東盛人氣血虛其衛氣去形獨居肌肉減皮膚縱腠理開毛髮殘腠理薄煙垢落當是之時遇賊風則其入深其病人也卒暴三虛者其死暴疾也得三實者邪不能傷人也乘年之衰逢月之空失時之和因為賊風所傷是謂三虛逢年之盛遇月之滿得時之和雖有賊風邪氣不能危之也歲之所以皆同病者此八正之候也候此者常以冬至之日太一立於葉蟄之宮其至也天必應之以風雨者矣風雨從南方來者為虛風賊傷人者也其以夜半至也萬民皆臥而弗犯也故其歲民少病其以晝至者萬民懈惰而皆中於虛風故萬民多病虛邪入客於骨而不發於外至其立春陽氣大發腠理開因立春之日風從西方來萬民又皆中於虛風此兩邪相搏經氣結代者矣故諸逢其風而遇其雨者名早遇歲露焉因歲之和而少賊風者民少病而少死歲多賊風邪氣寒溫不和則民多病而死矣正月朔日太一居天留之宮其日西北風不雨人多死矣正月朔日平旦北風春民多死正月朔日日中北風夏民多死正月朔日夕時北風秋民多死終日北風大病死者十有六正月朔日風從南方來命曰旱鄉從西方來命曰白骨將國有殃人多死亡正月朔日風從東方來髮屋揚沙石國有大災也正月朔日風從東南方行春有死亡正月朔日天和溫不風糴賤民不病天寒而風糴貴民多病此所謂候歲之風䔲傷人者也二月醜不風民多心腹病三月戌不溫民多寒熱四月已不暑民多疸病十月申不寒民多暴死諸所謂風者皆髮屋折樹木揚沙石起毫毛發腠理者也大惑論五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束里擷筋骨血氣之精而與脈併為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪其精其精氣中不相比也則精散精散則視歧視歧見兩物目者五臟六腑之精也營衛魂魄之所常營也神氣之所生也故神勞則魂魄散志意亂是故瞳子眼黑法於陰白眼赤脈法於陽也故陰陽合傳而精明也目者心之使也心者神之舍也故神分精亂而不揣卒然見非常處精神魂魄散不相得故曰惑也心有所喜神有所惡卒然相感則精氣亂視誤故惑神移乃復是故間者為迷甚者為惑人之善忘者上氣不足下氣有餘腸胃實而心肺虛虛則營衛留於下久之不以時上故善忘也人之善飢而不嗜食者精氣並於脾熱氣留於胃胃熱則消穀谷消故善飢胃氣逆上則胃脘寒故不嗜食也病而不得臥者衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹻盛不得入於陰則陰氣虛故目不得瞑矣病目而不得視者衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹻滿不得入於陽則陽氣虛故目閉也人之多臥者此人腸胃大而皮膚澀而分肉不解焉腸胃大則衛氣留久皮肝澀則分肉不解其行遲夫衛氣者晝日常行於陽夜行於陰故陽氣盡則臥陰氣盡則寤故腸胃大則衛氣行留久皮膚澀分肉不解則行遲留於陰也久其氣不精則欲瞑故多臥矣其腸胃小皮膚滑以緩分肉解利衛氣之留於陽也久故少瞑焉其非常經也卒然多臥者邪氣留於上焦上焦閉而不通已食若飲湯衛氣留久於陰而不行故卒然多臥焉治此諸邪先其臟腑味其小過後調其氣盛者瀉之虛者補之必先明知其形志之苦樂定乃取之癰疽
