body:
  text: 卷下陰陽系日月寅者正月之生陽也主左足之少陽未者六月主右足之少陽卯者二月主左足之太陽午者五月主右足之太陽辰者三月主左足之陽明巳者四月主右足之陽明此兩陽合於前故曰陽明申者七月之生陰也主右足之少陰醜者十二月主左足之少陰酉者八月主右足之太陰子者十一月主左足之太陰戌者九月主右足之厥陰亥者十月主左足之厥陰此兩陰交盡故曰厥陰甲主左手之少陽巳主右手之少陽乙主左手之太陽戊主右手之太陽丙主左手之陽明丁主右手之陽明此兩火併合故為陽明庚主右手之少陰癸主左手之少陰辛主右手之太陰壬主左手之太陰故足之陽者陰中之少陽也足之陰者陰中之太陰也手之陽者陽中之太陽也手之陰者陽中之少陰也腰以上者為陽腰以下者為陰其於五臟也心為陽中之太陽肺為陰中之少陰肝為陰中之少陽脾為陰中之至陰腎為陰中之太陰病傳病先發於心一日而之肺三日而之肝五日而之脾三日不已死冬夜半夏日中病先發於肺三日而之肝一日而之脾五日而之胃十日不已死冬日入夏日出病先發於肝三日而之脾五日而之胃三日而之腎三日不已死冬日入夏早食病先發於脾一日而之胃二日而之腎三日而之膂膀胱十日不已死冬人定夏晏食病先發於胃五日而之腎三日而之膂膀胱五日而上之心二日不已死冬夜半廈日昳病先發於腎三日而之膂膀胱三日而上之心三日而之小腸三日不已死冬大晨夏早晡病先發於膀胱五日而之腎一日而之小腸一日而之心二日不已死冬雞鳴夏下晡諸病以次相傳如是者皆有死期不可刺也淫邪發夢正邪從外襲內而未有定舍反淫於臟不得定處與營衛俱行而與魂魄飛揚使人臥不得安而喜夢氣淫於腑則有餘於外不足於內氣淫於臟則有餘於內不足於外陰氣盛則夢涉大水而恐懼陽氣盛則夢大火而燔焫陰陽俱盛則夢相殺上盛則夢飛下甚則夢墮盛飢則夢取盛飽則夢豫肝氣盛則夢怒肺氣盛則夢恐懼哭泣飛揚心氣盛則夢喜笑恐畏脾氣盛則夢歌樂身體重不舉腎氣盛則夢腰脊兩解不屬凡此十二盛者至而瀉之立已厥氣客於心則夢見丘山煙火客於肺則夢飛揚見金針之奇物客於肝則夢山林樹木客於脾則夢見丘陵大澤壞屋風雨客於腎則夢臨淵沒居水中客於膀胱則夢遊行客於胃則夢飲食客於大腸則夢田野客於小腸則夢聚邑沖衢客於膽則夢鬥訟自刳客於陰器則夢接內客於項則夢斬首客於脛則夢行走而不能前及居深地𡧙苑中客於股肱則夢禮節拜起客於胞䐈則夢泄便凡此十五不足者至而補之立已也順氣一日為四時春生夏長秋收冬藏是氣之常也人亦應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬朝則人氣始生病氣衰故旦慧日中人氣長長則勝邪故安夕則人氣始衰邪氣始生故加夜半人氣入臟邪氣獨居於身故甚也其時有反者是不應四時之氣臟獨生其病者是必以臟氣之所不勝時者甚以其所勝時者起也人有五臟五臟有五變肝為牡臟其色青其時春春音角其味酸其日甲乙心為牡臟其色赤其時夏其日丙丁其音徵其味苦脾為牡臟其色黃其時長夏其日戊己其音宮其味甘肺為牝臟其色白其音商其時秋其日庚辛其味辛腎為牝臟其色黑其時冬其日壬癸其音羽其味鹹是為五變五變木之所傷也皆傷其枝枝之剛脆而堅未成傷也人之有常病也亦因其骨節皮膚腠理之不堅固者邪之所舍也故常為病也本藏心小則安邪弗能傷易傷以憂心大則憂不能傷易傷於邪心高則滿於肺中悗而善忘難開以言心下則臟外易傷於寒易恐以言心堅則臟安守固心脆則善病消疸熱中心端正則和利難傷心偏傾則操持不一無守司也肺小則少飲不病喘喝肺大則多飲善病胸痹喉痹逆氣肺高則上氣肩息咳肺下則居賁迫肺善脅不痛肺堅則不病咳上氣肺脆則苦病消痹易傷肺端正則和利難傷肺偏傾則胸偏痛也肝小則臟安無脅下之病肝大則逼胃迫咽迫咽則苦膈中且脅下痛肝高則上支賁切脅悗為息賁肝下則逼胃脅下空脅下空則易受邪肝堅則臟安難傷肝脆則善病消疸易傷肝端正則和利難傷肝偏傾則脅下痛也脾小則臟安難傷於邪也脾大則苦腠䏚而痛不能疾行脾高則䏚引季脅而痛脾下則下加於大腸下加於大腸則臟苦受邪脾堅則臟安難傷脾脆則善病消疸易傷脾端正則和利難傷脾偏傾則善滿善脹也腎小則臟安難傷腎大則善病腰痛不可以俯仰易傷以邪腎高則苦背膂痛不可以俯仰腎下則腰尻痛不可以俯仰為狐疝腎堅不病腰背痛腎脆則善病消疸易傷腎端正則和利難傷腎偏傾則苦腰尻痛也凡此二十五變者人之所苦常病何以知其然也赤色小理者心小粗理者心大無𩩲𩨗者心高𩩲𩨗小短舉者心下𩩲𩨗長者心下堅𩩲𩨗弱小以薄者心脆𩩲𩨗直下不舉者心端正𩩲𩨗倚一方者心偏傾也白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合腋張脅者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脅偏疏者肺偏傾也青色小理者肝小粗理者肝大廣胸反骹骹音敲者肝高合脅兔骹者肝下胸脅好者肝堅脅骨弱者肝脆膺腹好相得者肝端正脅骨偏舉者肝偏傾也黃色小理者脾小粗理者脾大揭唇者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾也黑色小理者腎小粗理者腎大耳高者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾也凡此諸變者持則安減則病也五臟皆小者少病苦焦心大愁憂五臟皆大者緩於事難使以憂五臟皆高者好高舉措五臟皆下者好出人下五臟皆堅者無病五臟皆脆者不離於病五臟皆端正者和利得人心五臟皆偏傾者邪心而善盜不可以為人平反復言語也六腑之應肺合大腸者皮其應心合小腸小腸者脈其應肝合膽膽者筋其應脾合胃胃者肉其應腎合三焦膀胱三焦膀胱者腠理毫毛其應肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裡大者大腸大而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈衝小者小腸小而短諸陽經脈皆多紆屈小腸結脾應肉肉㿉堅大者胃厚肉㿉麼者胃薄肉㿉小而麼者胃不堅肉㿉不稱身者胃下胃下者下管約不利肉㿉不堅者胃緩肉㿉無小里纍者胃急肉䐃多小里纍者胃結胃結者上管約不利也肝應爪爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無紋者膽直爪惡色黑多紋者膽結也腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疏腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也視其外應以知其內藏則知所病矣五色明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽必中百歲其色粗以明沉夭者為甚其色上行者病益甚其色下行如雲徹散者病方已五色各有藏部有外部有內部也色從外部走內部者其病從外走內其色從內走外者其病從內走外病生於內者先治其陰後治其陽反者益甚其病生於陽者先治其外後治其內反者益甚其脈滑大以代而長者病從外來目有所見志有所惡此陽氣之並也可變而已大氣入於臟腑者不病而卒死矣赤色出兩顴大如母指者病雖小愈必卒死黑色出於庭大如母指必不病而卒死庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎也臍也面王以上者小腸也面王以下者膀胱子處也顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下者足也巨分者股里也巨曲者膝臏也此五臟六腑肢節之部也各有部分有部分用陰和陽用陽和陰當明部分萬舉萬當能別左右是謂大道男女異位故曰陰陽審察澤夭謂之良工沉濁為內浮澤為外黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚者為血痛甚為攣寒為皮不仁五色各見其部察其浮沉以知淺深察其澤夭以觀成敗察其散搏以知遠近視色上下以知病處積神於心以知往今故相氣不微不知是非屬意勿去乃知新故色明不粗沉夭為甚不明不澤其病不甚其色散駒駒然未有聚其病散而氣痛聚未成也腎乘心心先病腎為應色皆如是男子色在於面王為小腹痛下為卵痛其圜直為莖痛高為本下為首狐疝㿉陰之屬也女子在於面王為膀胱子處之病散為痛搏為聚方圓左右各如其色形其隨而下至胝為淫有潤如膏狀為暴食不潔左為左右為右其色有邪聚散而不端面色所指者也色者青黑赤白黃皆端滿有別鄉別目赤者其色亦大如榆莢在面主為不月其色上鋭首空上向下鋭下向在左右如法以五色命藏青為肝赤為心白為肺黃為脾黑為腎肝合筋心合脈肺合皮脾合肉腎合骨也論勇春青風夏陽風秋涼風冬寒風凡此四時之風者其所病各不同形黃色薄皮弱肉者不勝春之虛風白色薄皮弱肉者不勝夏之虛風青色薄皮弱肉者不勝秋之虛風赤色薄皮弱肉者不勝冬之虛風也黑色而皮厚肉堅固不傷於四時之風其皮薄而肉不堅色不一者長夏至而有虛風者病矣其皮厚而肌肉堅者長夏至而有虛風不病矣其皮厚而肌肉堅者必重感於寒外內皆然乃病夫人之忍痛與不忍痛者皮膚之薄厚肌肉之堅脆緩急之分也非勇怯之謂也酒者水穀之精熟谷之液也其氣剽悍其入於胃中則胃脹氣上逆滿於胸中肝浮膽橫當是之時固比於勇士氣衰則侮與勇士同類不知避之名曰酒悖也背腧胸中大腧在杼骨之端肺腧在三椎之傍心腧在五椎之間膈腧在七椎之傍肝腧在九椎之傍脾腧在十一椎之傍腎腧在十四椎之傍皆挾脊相去三寸所則欲得而驗之按其處應在中而痛解乃其腧也衛氣足太陽之本在跟以上五寸中標在兩絡命門命門者目也足少陽之本在竅陰之間標在窗籠之前窗籠者耳也足少陽之本在內踝下上三寸中標在背腧與舌下兩脈也足厥陰之本在行間上五寸所標在背腧也足陽明之本在厲兌標在人迎頰挾頏顙也足太陰之本在中封前上四寸之中標在背腧與舌本也手太陽之本在外踝之後標在命門之上一寸也手少陽之本在小指次指之間上二寸標在耳後上角下外眥也手陽明之本在肘骨中上至別陽標在顏下合鉗上也手太陰之本在寸口之中標在腋內動也手少陰之本在鋭骨之端標在背腧也手心主之本在掌後兩筋之間二寸中標在腋下下三寸也凡候此者下虛則厥下盛則熱上虛則眩上盛則熱痛故實者絶而止之虛者引而起之天年人之始生以母為基以父為楯失神者死得神者生血氣已和榮衛已通五藏已成神氣舍心魂魄畢具乃成為人五臟堅固血脈和調肌肉解利皮膚緻密營衛之行不失其常呼吸微徐氣以度行六腑化谷津液布揚各如其常故能常久人生十歲五臟始定血氣已通其氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五臟大定肌肉堅固血脈盛滿故好步四十歲五臟六腑十二經脈皆大盛以平定腠理始疏榮華頽落發頗斑白平盛不搖故好坐五十歲肝氣始衰肝葉始薄膽汁始減目始不明六十歲心氣始衰善憂悲血氣懈惰故好臥七十歲脾氣虛皮膚枯八十歲肺氣衰魄離故言善誤九十歲腎氣焦四藏經脈空虛百歲五臟皆虛神氣皆去形骸獨居而終矣其不能終壽而死者五臟皆不堅使道不長空外以張喘息暴疾又畢基牆薄脈少血其肉不實數中風寒血氣虛脈不通真邪相攻亂而相引故中壽而盡也五味胃者五臟六腑之海也水穀皆入於胃五臟六腑皆稟氣於胃五味各走其所喜穀味酸先走肝穀味苦先走心穀味甘先走脾穀味辛先走肺穀味咸先走腎穀氣津液已行營衛大通乃化糟粕以次傳下谷始入於胃其精微者先出於胃之兩焦以溉五臟別出兩行營衛之道其大氣之搏而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入天地之精氣其大數常出三入一故谷不入半日則氣衰一日則氣少矣五穀粳米甘麻酸大豆咸麥苦黃黍辛五果棗甘李酸粟咸杏苦桃辛五畜牛甘犬酸豬咸羊苦雞辛五菜葵甘韭酸藿咸薤苦蔥辛五色黃色宜甘青色宜酸黑色宜咸赤色宜苦白色宜辛凡此五者各有所宜所言五宜者脾病者宜食粳米飯牛肉棗心病者宜食麥羊肉杏薤腎病者宜食大豆黃卷豬肉栗藿肝病者宜食麻犬肉李韭肺病者宜食黃黍雞肉桃蔥五禁肝病禁辛心病禁咸脾病禁酸腎病禁甘肺病禁苦肝色青宜食甘粳米飯牛肉棗葵皆甘心色赤宜食酸犬肉麻李韭皆酸脾色黃宜食鹹大豆豕肉栗藿皆咸肺色白宜食苦麥羊肉杏薤皆苦腎色黑宜食辛黃黍雞肉桃蔥皆辛衛氣失常色起兩眉薄澤者病在皮唇色青黃赤白黑者病在肌肉營氣霈然者病在血氣目色青黃赤白黑者病在筋耳焦枯受塵垢病在骨皮之部輸於四末肉之柱在臂脛諸陽分肉之間與足少陰分間血氣之輸輸於諸絡氣血留居則盛而起筋部無陰無陽無左無右候病所在骨之屬者骨空之所以受益而益腦髓者也人年五十已上為老三十已上為壯十八已上為少六歲已上為小膕肉堅皮滿者脂膕肉不堅皮緩者膏皮肉不相離者肉膏者多氣多氣者熱熱者耐寒肉者多血則充形充形則平脂者其血清氣滑少故不能大此別於衆人者也衆人皮肉脂膏不能相加也血與氣不能相多故其形不小不大各自稱其身玉版夫癰疽之生膿血之成也膿已成十死一生其白眼青黑眼小是一逆也內藥而嘔者是二逆也腹痛渴甚是三逆也肩項中不便是四逆也音嘶色脫是五逆也除此五者為順矣諸病皆有逆順腹脹身熱脈大是一逆也腹鳴而滿四脈清泄其脈大是二逆也衄而不止脈大是三逆也咳且溲血脫形其脈小徑是四逆也咳脫形身熱脈小以疾是謂五逆也如是者不過十五日而死矣其腹大脹四末清脫形泄甚是一逆也腹脹便血其脈大時絶是二逆也咳溲血形肉脫脈搏是三逆也嘔血胸滿引背脈小而疾是四逆也咳嘔腹脹且飧泄其脈絶是五逆也如是者不及一時而死矣五禁甲乙日自乘無剌頭無發矇於耳內丙丁日自乘無振埃於肩喉廉泉戊己日自乘四季無剌腹去爪瀉水庚辛日自乘無剌關節於股膝壬癸日自乘無剌足脛是謂五禁形肉已奪是一奪也大奪血之後是二奪也大汗出之後是三奪也大泄之後是四奪也新産及大血之後是五奪也此皆不可瀉熱病脈靜汗已出脈盛躁是一逆也病泄脈洪大是二逆也著痹不移㿉肉破身熱脈偏絶是三逆也淫而奪形身熱色夭然白及後下血衃音坯血衃篤重是謂四逆也寒熱奪形脈堅搏是謂五逆也動輸手太陰足少陰陽明獨動不休何也足陽明胃脈也胃為五臟六腑之海其精氣上注於肺肺氣從太陰而行之其行也以息往來故人一呼脈再動一吸脈亦再動呼吸不已故動而不止足之陽明何因而動胃氣上注於肺其悍氣上衝頭者循咽上走空竅循眼系入絡腦出顑下客主人循牙車合陽明並下人迎此胃氣別走於陽明者也故陰陽上下其動也若一故陽病而陽脈小者為逆陰病而陰脈大者為逆故陰陽俱靜俱動若引繩相傾者病足少陰何因而動衝脈者十二經之海也與少陰之大絡起於腎下出於氣街循陰股內廉邪入膕中循脛骨內廉並少陰之經下入內踝之後入足下其別者邪入踝出屬附上入大指之間注諸絡以溫足脛此脈之常動者也五味論酸入於胃其氣澀以收上之兩焦弗能出入也不出即留於胃中胃中和溫則下注膀胱膀胱胞薄以濡得酸則縮綣約而不通水道不行故癃隆者積筋之所終也故酸入而走筋矣鹹入於胃其氣上走中焦注於脈則血氣走之血與咸相得則凝凝則胃中汁注之注之則胃中竭竭則咽路焦故舌本干而善渴血脈者中焦之道也故鹹入而走血矣辛入於胃其氣走於上焦上焦者受氣而營諸陽者也姜韭之氣薰之營衛之氣不時受之久留心下故洞心辛與氣俱行故辛入而與汗俱出苦入於胃五穀之氣皆不能勝苦苦入下脘三焦之道皆閉而不通故變嘔齒者骨之所終也故苦入而走骨故入而復出知其走骨也甘入於胃其氣弱小不能上至於上焦而與谷留於胃中者令人柔潤者也胃柔則緩緩則蠱動蠱動則令人悗心其氣外通於肉故甘走肉陰陽二十五人木形之人比於上角似於蒼帝其為人蒼色小頭長面大肩背直身小手足有才好勞心少力多憂勞於事能春夏不能秋冬感而病生足厥陰他他然大角之人比於左足少陽少陽之上遺遺然左角之人比於右足少陽少陽之下隨隨然𮡧音犬角之人比於右足少陽少陽之上推推然判角之人比於左足少陽少陽之下栝栝然火形之人比於上徵似於赤帝其為人赤色廣矧鋭面小頭好肩背髀腹小手足行安地疾心行搖肩背肉滿有氣輕財少信多慮見事明好顏急心不壽暴死能春夏不能秋冬秋冬感而病生手少陰核核然質徵之人比於左手太陽太陽之上肌肌然少徵之人比於右手太陽太陽之下慆慆音叨然右徵之人比於右手太陽太陽之上鮫