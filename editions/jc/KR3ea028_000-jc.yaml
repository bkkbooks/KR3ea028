front:
  text: 序靈樞素問其間問答多有重出處然猶二書無害也即一書亦有重出者豈其義理深奧不憚重於問答乎抑因論彼而復及此乎余茲選之亦未免重者重獨者逸惟求當其要而順其文耳覽者幸勿訝云錢塘胡文煥德甫識
